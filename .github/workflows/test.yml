name: Test

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: test-pr-${{ github.event.pull_request.head.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Tests must pass
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'

      - name: Install deps
        run: yarn install --frozen-lockfile

      - name: Run tests
        run: yarn test --watchAll=false --ci --forceExit
