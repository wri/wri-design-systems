name: Build and Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

env:
  APP_BUILD_DIR: build
  STORYBOOK_DIR: storybook-static
  PUBLISH_DIR: public

jobs:
  detect_auto_release:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.detect.outputs.skip }}
    steps:
      - name: Detect auto-release label on merged PR
        id: detect
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const commitSha = context.sha;

            let skip = 'false';

            try {
              const pulls = await github.request(
                'GET /repos/{owner}/{repo}/commits/{commit_sha}/pulls',
                {
                  owner,
                  repo,
                  commit_sha: commitSha,
                  mediaType: { previews: ['groot'] }
                }
              );

              const pr = (pulls.data || [])[0];
              if (!pr) {
                core.setOutput('skip', skip);
                return;
              }

              const labels = (pr.labels || []).map((l) => String(l.name).toLowerCase());
              skip = labels.includes('auto-release') ? 'true' : 'false';
            } catch (error) {
              core.warning(`Unable to detect auto-release label for commit ${commitSha}: ${error.message}`);
            }

            core.setOutput('skip', skip);

  deploy_feature:
    name: Build and Deploy (feature)
    needs: detect_auto_release
    if: ${{ needs.detect_auto_release.outputs.skip != 'true' }}
    concurrency:
      group: pages-feature
      cancel-in-progress: false
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'yarn'

      - name: Install deps
        run: yarn install --frozen-lockfile

      - name: Build app
        run: |
          export PUBLIC_URL='/${{ github.event.repository.name }}/demo/'
          yarn build-app

      - name: Build Storybook
        run: yarn build-storybook --output-dir ${{ env.STORYBOOK_DIR }}

      - name: Assemble publish directory
        run: |
          rm -rf $PUBLISH_DIR
          mkdir -p $PUBLISH_DIR/demo
          cp -r $APP_BUILD_DIR/* $PUBLISH_DIR/demo/
          cp -r $STORYBOOK_DIR/* $PUBLISH_DIR/
          # SPA fallback opcional (React Router, etc.)
          if [ -f "$PUBLISH_DIR/index.html" ]; then cp $PUBLISH_DIR/index.html $PUBLISH_DIR/404.html; fi
          if [ -f "$PUBLISH_DIR/demo/index.html" ]; then cp $PUBLISH_DIR/demo/index.html $PUBLISH_DIR/demo/404.html; fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.PUBLISH_DIR }}

  deploy:
    needs: [detect_auto_release, deploy_feature]
    if: ${{ needs.deploy_feature.result == 'success' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
