name: Release & Publish

on:
  pull_request:
    branches: [main]
    types: [closed]

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  create_release_pr:
    name: Create release PR
    if: >
      github.event.pull_request.merged == true &&
      !contains(join(github.event.pull_request.labels.*.name, ','), 'auto-release') &&
      (
        contains(join(github.event.pull_request.labels.*.name, ','), 'patch') ||
        contains(join(github.event.pull_request.labels.*.name, ','), 'minor') ||
        contains(join(github.event.pull_request.labels.*.name, ','), 'major')
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Use Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Determine version bump from PR label
        id: bump
        uses: actions/github-script@v7
        with:
          script: |
            const allowed = ['major', 'minor', 'patch'];
            const labels = (context.payload.pull_request.labels || []).map(l => l.name.toLowerCase());
            const found = labels.find(l => allowed.includes(l));
            if (!found) {
              core.setFailed('Missing required label (major|minor|patch).');
            } else {
              core.setOutput('bump', found);
            }

      - name: Configure Git user
        run: |
          git config user.name "ds-wri-bot"
          git config user.email "ds-bot@wri.org"

      - name: Bump version (no tag)
        run: npm version ${{ steps.bump.outputs.bump }} --no-git-tag-version

      - name: Read new version
        id: ver
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create release PR
        id: create_pr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: release-v${{ steps.ver.outputs.version }}
          base: main
          commit-message: 'release: v${{ steps.ver.outputs.version }}'
          title: 'release: v${{ steps.ver.outputs.version }}'
          body: |
            Automated release PR.

            - Source PR: #${{ github.event.pull_request.number }}
            - Version bump: `${{ steps.bump.outputs.bump }}`
            - New version: `${{ steps.ver.outputs.version }}`

            After merge, publish from this commit/tag.
          labels: |
            auto-release
            ${{ steps.bump.outputs.bump }}

      - name: Enable auto-merge on release PR
        if: ${{ steps.create_pr.outputs.pull-request-number != '' }}
        uses: actions/github-script@v7
        with:
          script: |
            const pull_number = Number('${{ steps.create_pr.outputs.pull-request-number }}');
            const { owner, repo } = context.repo;
            const pr = await github.rest.pulls.get({ owner, repo, pull_number });

            try {
              await github.graphql(
                `mutation($pullRequestId: ID!) {
                  enablePullRequestAutoMerge(input: {
                    pullRequestId: $pullRequestId,
                    mergeMethod: SQUASH
                  }) {
                    pullRequest { number }
                  }
                }`,
                { pullRequestId: pr.data.node_id }
              );
            } catch (error) {
              const message = String(error?.message || '');
              const ignorable =
                message.includes('Pull request is in clean status') ||
                message.includes('auto-merge is already enabled') ||
                message.includes('was already merged');

              if (ignorable) {
                core.warning(`Skipping auto-merge enable for #${pull_number}: ${message}`);
              } else {
                throw error;
              }
            }

  publish_release:
    name: Tag, Publish & Create GitHub Release
    if: >
      github.event.pull_request.merged == true &&
      contains(join(github.event.pull_request.labels.*.name, ','), 'auto-release') &&
      startsWith(github.event.pull_request.head.ref, 'release-v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.merge_commit_sha }}

      - name: Use Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          registry-url: 'https://registry.npmjs.org'
          cache: 'yarn'

      - name: Install deps
        run: yarn install --frozen-lockfile

      - name: Build
        run: yarn build

      - name: Read version
        id: ver
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Configure Git user
        run: |
          git config user.name "ds-wri-bot"
          git config user.email "ds-bot@wri.org"

      - name: Create and push tag
        id: tag
        run: |
          TAG="v${{ steps.ver.outputs.version }}"
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists. Skipping tag creation."
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git tag -a "$TAG" -m "release: $TAG"
          git push origin "$TAG"
          echo "should_publish=true" >> "$GITHUB_OUTPUT"

      - name: Publish to npm
        if: steps.tag.outputs.should_publish == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

      - name: Create GitHub Release (auto-notes)
        if: steps.tag.outputs.should_publish == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: v${{ steps.ver.outputs.version }}
          generate_release_notes: true

  no_bump_notice:
    name: Skip release (no-bump)
    if: >
      github.event.pull_request.merged == true &&
      !contains(join(github.event.pull_request.labels.*.name, ','), 'auto-release') &&
      contains(join(github.event.pull_request.labels.*.name, ','), 'no-bump')
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: mshick/add-pr-comment@v2
        with:
          message: '🚨 Release skipped: PR labeled **no-bump**. No version bump PR was created.'
